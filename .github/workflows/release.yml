name: Publish to GitHub Packages

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - packages/codex-litellm/package.json
      - packages/codex-litellm/bin/**
      - .github/workflows/release.yml
      - scripts/verify-npm-release-metadata.mjs
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NPM_CONFIG_ENGINE_STRICT: 'true'
      GITHUB_PACKAGES_REGISTRY: https://npm.pkg.github.com
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Configure ephemeral GitHub Packages npm auth
        run: |
          set -euo pipefail
          npmrc="$RUNNER_TEMP/github-packages.npmrc"
          umask 077
          cat > "$npmrc" <<'EOF'
          @happycastle114:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF
          printf 'NPM_CONFIG_USERCONFIG=%s\n' "$npmrc" >> "$GITHUB_ENV"
          test -s "$npmrc"

      - name: Install dependencies
        run: npm ci

      - name: Verify main revision and package metadata
        run: |
          set -euo pipefail
          RELEASE_VERSION="$(node -p "const p=require('./package.json'); p.version")"
          printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION" >> "$GITHUB_ENV"
          [[ "$GITHUB_REF_NAME" == main ]] || {
            printf 'Publishing is allowed only from main; received %s\n' "$GITHUB_REF_NAME" >&2
            exit 1
          }
          git fetch origin refs/heads/main:refs/remotes/origin/main --no-tags --prune
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            printf 'Release SHA %s is not contained in origin/main\n' "$GITHUB_SHA" >&2
            exit 1
          }
          node - <<'NODE'
          const fs = require('node:fs')
          const root = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const wrapper = JSON.parse(fs.readFileSync('packages/codex-litellm/package.json', 'utf8'))
          const expectedRegistry = process.env.GITHUB_PACKAGES_REGISTRY
          const coreDependency = wrapper.dependencies?.[root.name]
          const manifests = [root, wrapper]
          if (root.version !== wrapper.version || coreDependency !== root.version) {
            throw new Error(`Release version mismatch: core=${root.version} wrapper=${wrapper.version} dependency=${coreDependency}`)
          }
          if (wrapper.name !== '@happycastle114/codex-litellm') {
            throw new Error(`Wrapper must be scoped for GitHub Packages: ${wrapper.name}`)
          }
          for (const manifest of manifests) {
            if (manifest.publishConfig?.registry !== expectedRegistry) {
              throw new Error(`Package ${manifest.name} is not configured for ${expectedRegistry}`)
            }
            if (manifest.repository?.url !== root.repository?.url) {
              throw new Error(`Repository metadata mismatch: ${manifest.repository?.url} != ${root.repository?.url}`)
            }
          }
          process.stdout.write(`Publishing ${root.name}@${root.version} and ${wrapper.name}@${wrapper.version}\n`)
          NODE

      - name: Test, build, and typecheck
        run: npm test

      - name: Pack tested tarballs
        run: |
          set -euo pipefail
          CORE_PACKAGE="$(node -p "const p=require('./package.json'); p.name+'@'+p.version")"
          WRAPPER_PACKAGE="$(node -p "const p=require('./packages/codex-litellm/package.json'); p.name+'@'+p.version")"
          core_stage="$RUNNER_TEMP/core-stage"
          wrapper_stage="$RUNNER_TEMP/wrapper-stage"
          mkdir -p "$core_stage" "$wrapper_stage"
          cp package.json README.md LICENSE "$core_stage/"
          cp -R src dist skills "$core_stage/"
          cp packages/codex-litellm/package.json packages/codex-litellm/README.md packages/codex-litellm/LICENSE "$wrapper_stage/"
          cp -R packages/codex-litellm/bin "$wrapper_stage/"
          node - "$GITHUB_SHA" "$core_stage/package.json" "$wrapper_stage/package.json" <<'NODE'
          const fs = require('node:fs')
          const [gitHead, ...manifests] = process.argv.slice(2)
          for (const path of manifests) {
            const manifest = JSON.parse(fs.readFileSync(path, 'utf8'))
            manifest.gitHead = gitHead
            fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`)
          }
          NODE
          (cd "$core_stage" && npm pack --ignore-scripts --json --pack-destination "$RUNNER_TEMP") > "$RUNNER_TEMP/core-pack.json"
          (cd "$wrapper_stage" && npm pack --ignore-scripts --json --pack-destination "$RUNNER_TEMP") > "$RUNNER_TEMP/wrapper-pack.json"

          pack_field() {
            node - "$1" "$2" <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')
          const [manifest, field] = process.argv.slice(2)
          const [entry] = JSON.parse(fs.readFileSync(manifest, 'utf8'))
          if (!entry || typeof entry[field] !== 'string') throw new Error(`npm pack has no ${field}`)
          process.stdout.write(field === 'filename' ? path.resolve(path.dirname(manifest), entry[field]) : entry[field])
          NODE
          }
          manifest_field() {
            tar -xOf "$1" package/package.json | node -e '
          let raw = ""
          process.stdin.on("data", (chunk) => { raw += chunk })
          process.stdin.on("end", () => {
            const manifest = JSON.parse(raw)
            const value = manifest[process.argv[1]]
            if (typeof value !== "string") throw new Error(`Tarball manifest has no ${process.argv[1]}`)
            process.stdout.write(value)
          })
            ' "$2"
          }
          integrity_for() {
            node - "$1" <<'NODE'
          const fs = require('node:fs')
          const crypto = require('node:crypto')
          const bytes = fs.readFileSync(process.argv[2])
          process.stdout.write(`sha512-${crypto.createHash('sha512').update(bytes).digest('base64')}`)
          NODE
          }

          CORE_TARBALL="$(pack_field "$RUNNER_TEMP/core-pack.json" filename)"
          WRAPPER_TARBALL="$(pack_field "$RUNNER_TEMP/wrapper-pack.json" filename)"
          [[ "$(pack_field "$RUNNER_TEMP/core-pack.json" name)@$(pack_field "$RUNNER_TEMP/core-pack.json" version)" == "$CORE_PACKAGE" ]]
          [[ "$(pack_field "$RUNNER_TEMP/wrapper-pack.json" name)@$(pack_field "$RUNNER_TEMP/wrapper-pack.json" version)" == "$WRAPPER_PACKAGE" ]]
          [[ -s "$CORE_TARBALL" && -s "$WRAPPER_TARBALL" ]]
          [[ "$(manifest_field "$CORE_TARBALL" gitHead)" == "$GITHUB_SHA" ]]
          [[ "$(manifest_field "$WRAPPER_TARBALL" gitHead)" == "$GITHUB_SHA" ]]
          {
            printf 'CORE_PACKAGE=%s\n' "$CORE_PACKAGE"
            printf 'WRAPPER_PACKAGE=%s\n' "$WRAPPER_PACKAGE"
            printf 'CORE_TARBALL=%s\n' "$CORE_TARBALL"
            printf 'WRAPPER_TARBALL=%s\n' "$WRAPPER_TARBALL"
            printf 'CORE_INTEGRITY=%s\n' "$(integrity_for "$CORE_TARBALL")"
            printf 'WRAPPER_INTEGRITY=%s\n' "$(integrity_for "$WRAPPER_TARBALL")"
          } >> "$GITHUB_ENV"
          printf 'Core tarball: %s\nWrapper tarball: %s\n' "$CORE_TARBALL" "$WRAPPER_TARBALL"

      - name: Verify packed tarballs
        run: |
          set -euo pipefail
          consumer="$(mktemp -d)"
          printf '{"name":"packed-release-consumer","private":true,"version":"0.0.0"}\n' > "$consumer/package.json"
          (
            cd "$consumer"
            npm install --ignore-scripts --no-audit --no-fund --package-lock=false "$CORE_TARBALL"
            npm install --ignore-scripts --no-audit --no-fund --package-lock=false "$WRAPPER_TARBALL"
            node - <<'NODE'
          const fs = require('node:fs')
          const read = (path) => JSON.parse(fs.readFileSync(path, 'utf8'))
          const wrapper = read('node_modules/@happycastle114/codex-litellm/package.json')
          const core = read('node_modules/@happycastle114/opencode-litellm/package.json')
          if (core.name !== '@happycastle114/opencode-litellm' || core.version !== process.env.RELEASE_VERSION || core.gitHead !== process.env.GITHUB_SHA) {
            throw new Error('Packed core manifest identity mismatch')
          }
          if (wrapper.name !== '@happycastle114/codex-litellm' || wrapper.version !== process.env.RELEASE_VERSION || wrapper.gitHead !== process.env.GITHUB_SHA) {
            throw new Error('Packed wrapper manifest identity mismatch')
          }
          if (wrapper.dependencies?.['@happycastle114/opencode-litellm'] !== process.env.RELEASE_VERSION) {
            throw new Error('Packed wrapper dependency is not exact')
          }
          NODE
            node_modules/.bin/opencode-litellm --help >/dev/null
            node_modules/.bin/codex-litellm --help >/dev/null
          )

      - name: Check pre-existing GitHub Packages metadata
        id: registry
        run: |
          set -euo pipefail
          check_package() {
            local package_id="$1"
            local package_spec="$2"
            local integrity="$3"
            local result
            result="$(node scripts/verify-npm-release-metadata.mjs preflight \
              --registry "$GITHUB_PACKAGES_REGISTRY" \
              --package "$package_spec" \
              --git-head "$GITHUB_SHA" \
              --integrity "$integrity")"
            printf '%s\n' "$result" > "$RUNNER_TEMP/${package_id}-preflight.json"
            local status
            status="$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).status)' "$result")"
            case "$status" in
              missing)
                printf 'publish_%s=true\n' "$package_id" >> "$GITHUB_OUTPUT"
                ;;
              valid)
                printf 'publish_%s=false\n' "$package_id" >> "$GITHUB_OUTPUT"
                ;;
              *)
                printf 'Unexpected preflight status for %s: %s\n' "$package_spec" "$status" >&2
                return 1
                ;;
            esac
          }
          check_package core "$CORE_PACKAGE" "$CORE_INTEGRITY"
          check_package wrapper "$WRAPPER_PACKAGE" "$WRAPPER_INTEGRITY"

      - name: Publish scoped core tarball
        if: steps.registry.outputs.publish_core == 'true'
        run: npm publish "$CORE_TARBALL" --ignore-scripts --access public --registry "$GITHUB_PACKAGES_REGISTRY"

      - name: Publish scoped Codex wrapper tarball
        if: steps.registry.outputs.publish_wrapper == 'true'
        run: npm publish "$WRAPPER_TARBALL" --ignore-scripts --access public --registry "$GITHUB_PACKAGES_REGISTRY"

      - name: Verify published metadata and tarball identity
        run: |
          set -euo pipefail
          verify_readback() {
            local package_id="$1"
            local package_spec="$2"
            local package_name="${package_spec%@*}"
            local expected_integrity="$3"
            node scripts/verify-npm-release-metadata.mjs readback \
              --registry "$GITHUB_PACKAGES_REGISTRY" \
              --package "$package_spec" \
              --git-head "$GITHUB_SHA" \
              --integrity "$expected_integrity" \
              --attempts 6 \
              --delay-ms 5000

            local destination="$RUNNER_TEMP/${package_id}-readback"
            mkdir -p "$destination"
            local pack_json="$destination/pack.json"
            npm pack "$package_spec" --ignore-scripts --json --pack-destination "$destination" > "$pack_json"
            local tarball
            tarball="$(node - "$pack_json" <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')
          const [manifest] = process.argv.slice(2)
          const [entry] = JSON.parse(fs.readFileSync(manifest, 'utf8'))
          if (!entry || typeof entry.filename !== 'string') throw new Error('npm pack returned no filename')
          process.stdout.write(path.resolve(path.dirname(manifest), entry.filename))
          NODE
            )"
            [[ -s "$tarball" ]]
            local actual_integrity
            actual_integrity="$(node - "$tarball" <<'NODE'
          const fs = require('node:fs')
          const crypto = require('node:crypto')
          process.stdout.write(`sha512-${crypto.createHash('sha512').update(fs.readFileSync(process.argv[2])).digest('base64')}`)
          NODE
            )"
            [[ "$actual_integrity" == "$expected_integrity" ]]
            [[ "$(tar -xOf "$tarball" package/package.json | node -e 'let raw=""; process.stdin.on("data", c => raw += c); process.stdin.on("end", () => process.stdout.write(JSON.parse(raw).name))')" == "$package_name" ]]
            [[ "$(tar -xOf "$tarball" package/package.json | node -e 'let raw=""; process.stdin.on("data", c => raw += c); process.stdin.on("end", () => process.stdout.write(JSON.parse(raw).version))')" == "${package_spec##*@}" ]]
            [[ "$(tar -xOf "$tarball" package/package.json | node -e 'let raw=""; process.stdin.on("data", c => raw += c); process.stdin.on("end", () => process.stdout.write(JSON.parse(raw).gitHead ?? ""))')" == "$GITHUB_SHA" ]]
            printf '%s readback tarball identity: %s\n' "$package_spec" "$tarball"
          }
          verify_readback core "$CORE_PACKAGE" "$CORE_INTEGRITY"
          verify_readback wrapper "$WRAPPER_PACKAGE" "$WRAPPER_INTEGRITY"

      - name: Verify clean GitHub Packages consumer install
        run: |
          set -euo pipefail
          consumer="$(mktemp -d)"
          printf '{"name":"github-packages-release-consumer","private":true,"version":"0.0.0"}\n' > "$consumer/package.json"
          (
            cd "$consumer"
            [[ "$(npm config get @happycastle114:registry)" == "$GITHUB_PACKAGES_REGISTRY" ]]
            npm install --ignore-scripts --no-audit --no-fund --package-lock=false "$WRAPPER_PACKAGE"
            node - <<'NODE'
          const fs = require('node:fs')
          const read = (path) => JSON.parse(fs.readFileSync(path, 'utf8'))
          const wrapper = read('node_modules/@happycastle114/codex-litellm/package.json')
          const core = read('node_modules/@happycastle114/opencode-litellm/package.json')
          if (wrapper.name !== '@happycastle114/codex-litellm' || wrapper.version !== process.env.RELEASE_VERSION || wrapper.gitHead !== process.env.GITHUB_SHA) {
            throw new Error('Installed wrapper manifest identity mismatch')
          }
          if (core.name !== '@happycastle114/opencode-litellm' || core.version !== process.env.RELEASE_VERSION || core.gitHead !== process.env.GITHUB_SHA) {
            throw new Error('Installed core manifest identity mismatch')
          }
          if (wrapper.dependencies?.['@happycastle114/opencode-litellm'] !== process.env.RELEASE_VERSION) {
            throw new Error(`Wrapper dependency is not exact ${process.env.RELEASE_VERSION}`)
          }
          NODE
            test -s node_modules/.bin/opencode-litellm
            test -s node_modules/.bin/codex-litellm
            node_modules/.bin/opencode-litellm --help >/dev/null
            node_modules/.bin/codex-litellm --help >/dev/null
          )
