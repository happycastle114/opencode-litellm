name: ✨ Toolkit feature request
description: Suggest an improvement to the OpenCode, Codex, or Claude toolkit
labels: ["enhancement"]
body:
  - type: dropdown
    id: target
    attributes:
      label: Target surface
      description: Which client or shared capability should this improve?
      options:
        - OpenCode
        - Codex
        - Claude launcher
        - Shared discovery, MCP, toolsets, SSO, or skills
        - Packaging or installation
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: package-target
    attributes:
      label: Package target
      description: Which package should own the change, if known?
      options:
        - "@happycastle114/opencode-litellm (core)"
        - "codex-litellm (Codex wrapper)"
        - Both packages
        - Not sure
    validations:
      required: true

  - type: input
    id: toolkit-version
    attributes:
      label: Toolkit version or commit (optional)
      description: Include the version or commit where you observed the need.
      placeholder: 0.7.0 or 40-character commit SHA

  - type: input
    id: client-versions
    attributes:
      label: Relevant client versions (optional)
      description: Include OpenCode, Codex, and/or Claude Code versions when relevant.
      placeholder: OpenCode 1.14.28; Codex 0.XX.X; Claude Code 1.0.x

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution.
      placeholder: When using LiteLLM with X, I have to manually do Y every time...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe how you'd like the toolkit to behave.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workarounds you've tried, or other plugins that solve part of this.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Confirm that this request fits the current toolkit boundary.
      options:
        - label: My request improves an OpenCode, Codex, or Claude launcher flow
          required: true
        - label: My request concerns LiteLLM discovery, MCP/toolsets, SSO, shared skills, packaging, or installation
          required: true
